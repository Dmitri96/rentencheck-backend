services:
  laravel:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: rentencheck_laravel
    restart: unless-stopped
    environment:
      APP_NAME: "${APP_NAME:-Rentencheck}"
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: false
      APP_URL: "${APP_URL}"
      LOG_CHANNEL: stderr
      LOG_DEPRECATIONS_CHANNEL: null
      LOG_LEVEL: error
      DB_CONNECTION: "${DB_CONNECTION:-mysql}"
      DB_HOST: "${DB_HOST:-localhost}"
      DB_DATABASE: "${DB_DATABASE:-rentencheck}"
      DB_USERNAME: "${DB_USERNAME:-root}"
      DB_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - ./storage:/app/storage
    networks:
      - rentencheck_network

  nextjs:
    build:
      context: ../rentencheck-frontend
      dockerfile: Dockerfile.prod
    container_name: rentencheck_nextjs
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
    networks:
      - rentencheck_network
    depends_on:
      - laravel

  nginx:
    image: nginx:alpine
    container_name: rentencheck_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - rentencheck_network
    depends_on:
      - laravel
      - nextjs

  db:
    image: mysql:8.0
    container_name: rentencheck_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - rentencheck_network

networks:
  rentencheck_network:
    driver: bridge

volumes:
  db_data:
    driver: local
